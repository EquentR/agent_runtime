basePath: /api/v1
definitions:
  handlers.AuthLoginSwaggerRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handlers.AuthLogoutSwaggerData:
    properties:
      logged_out:
        type: boolean
    type: object
  handlers.AuthLogoutSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/handlers.AuthLogoutSwaggerData'
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
  handlers.AuthRegisterSwaggerRequest:
    properties:
      confirm_password:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handlers.AuthUserSwaggerDoc:
    properties:
      id:
        type: integer
      username:
        type: string
    type: object
  handlers.AuthUserSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/handlers.AuthUserSwaggerDoc'
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
  handlers.ConversationDeleteSwaggerData:
    properties:
      deleted:
        type: boolean
    type: object
  handlers.ConversationDeleteSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/handlers.ConversationDeleteSwaggerData'
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
  handlers.ConversationDetailSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/handlers.ConversationSwaggerDoc'
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
  handlers.ConversationListSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/handlers.ConversationSwaggerDoc'
        type: array
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
  handlers.ConversationMessageDoc:
    properties:
      content:
        type: string
      reasoning:
        type: string
      role:
        type: string
      tool_call_id:
        type: string
    type: object
  handlers.ConversationMessagesSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/handlers.ConversationMessageDoc'
        type: array
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
  handlers.ConversationSwaggerDoc:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      id:
        type: string
      last_message:
        type: string
      last_message_at:
        type: string
      message_count:
        type: integer
      model_id:
        type: string
      provider_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  handlers.CreateTaskRequest:
    properties:
      config:
        additionalProperties: {}
        type: object
      created_by:
        type: string
      idempotency_key:
        type: string
      input:
        additionalProperties: {}
        type: object
      metadata:
        additionalProperties: {}
        type: object
      task_type:
        type: string
    type: object
  handlers.ErrorSwaggerResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
  handlers.ExampleSayHelloSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        type: string
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
  handlers.TaskSwaggerDoc:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      current_step_key:
        type: string
      current_step_title:
        type: string
      id:
        type: string
      retry_of_task_id:
        type: string
      status:
        type: string
      task_type:
        type: string
      updated_at:
        type: string
    type: object
  handlers.TaskSwaggerResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/handlers.TaskSwaggerDoc'
      message:
        type: string
      ok:
        type: boolean
      time:
        type: string
    type: object
info:
  contact: {}
  description: Agent Runtime 示例应用 API 文档。
  title: Agent Runtime API
  version: 0.0.1
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 校验用户名密码并写入 session cookie，成功后返回当前用户信息。
      parameters:
      - description: 登录请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AuthLoginSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthUserSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 用户登录
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 删除当前 session 并清理浏览器中的 session cookie。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthLogoutSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 退出登录
      tags:
      - auth
  /auth/me:
    get:
      description: 校验 session cookie 后返回当前登录用户的基础信息。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthUserSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取当前用户
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码创建账号，注册成功后返回用户基础信息。
      parameters:
      - description: 注册请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AuthRegisterSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthUserSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 注册账号
      tags:
      - auth
  /conversations:
    get:
      description: 返回按最近活跃时间倒序排列的 conversation 列表，包含标题、最后一条消息摘要和消息数等轻量展示字段。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConversationListSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取会话列表
      tags:
      - conversations
  /conversations/{id}:
    delete:
      description: 根据 conversation id 删除会话及其历史消息，供 UI 删除会话项。
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConversationDeleteSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 删除会话
      tags:
      - conversations
    get:
      description: 根据 conversation id 返回会话元数据，包括 provider、model、标题、最近消息摘要与消息数。
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConversationDetailSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取会话详情
      tags:
      - conversations
  /conversations/{id}/messages:
    get:
      description: 根据 conversation id 返回按写入顺序排列的历史消息列表，供 UI 恢复聊天内容。
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConversationMessagesSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取会话消息历史
      tags:
      - conversations
  /hello/say:
    get:
      description: 返回一个简单的问候语，用于确认 HTTP 服务已经启动。
      parameters:
      - description: 名称
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ExampleSayHelloSwaggerResponse'
      summary: 示例问候接口
      tags:
      - example
  /swagger:
    get:
      description: 将 `/swagger` 与 `/swagger/` 重定向到可直接访问的 Swagger UI 页面。
      produces:
      - text/html
      responses:
        "302":
          description: redirect to /swagger/index.html
          schema:
            type: string
      summary: Swagger UI 重定向
      tags:
      - swagger
  /swagger/index.html:
    get:
      description: 返回内嵌的 Swagger UI HTML 页面，便于在浏览器中查看和调试 API。
      produces:
      - text/html
      responses:
        "200":
          description: Swagger UI HTML
          schema:
            type: string
      summary: 获取 Swagger UI 页面
      tags:
      - swagger
  /swagger/swagger.json:
    get:
      description: 返回当前服务使用的 Swagger JSON 文档。
      produces:
      - application/json
      responses:
        "200":
          description: swagger json
          schema:
            type: string
      summary: 获取 Swagger JSON 文档
      tags:
      - swagger
  /swagger/swagger.yaml:
    get:
      description: 返回当前服务使用的 Swagger YAML 文档。
      produces:
      - text/plain
      responses:
        "200":
          description: swagger yaml
          schema:
            type: string
      summary: 获取 Swagger YAML 文档
      tags:
      - swagger
  /tasks:
    post:
      consumes:
      - application/json
      description: 创建一个新的后台任务，并立即返回任务快照。
      parameters:
      - description: 创建任务请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TaskSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 创建任务
      tags:
      - tasks
  /tasks/{id}:
    get:
      description: 根据任务 id 返回当前任务快照。
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TaskSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取任务详情
      tags:
      - tasks
  /tasks/{id}/cancel:
    post:
      description: 发起任务取消请求；若任务尚未执行，会直接进入 cancelled。
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TaskSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 取消任务
      tags:
      - tasks
  /tasks/{id}/events:
    get:
      description: 先补发 after_seq 之后的历史事件，再持续推送实时事件。
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: string
      - description: 仅返回该序号之后的事件
        in: query
        name: after_seq
        type: integer
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE event stream
          schema:
            type: string
        "404":
          description: task not found
          schema:
            type: string
      summary: 订阅任务事件
      tags:
      - tasks
  /tasks/{id}/retry:
    post:
      description: 基于一个已存在任务创建新的重试任务，并返回新的任务快照。
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TaskSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 重试任务
      tags:
      - tasks
  /tasks/running:
    get:
      description: 根据 conversation id 返回最近一个非终态任务；若不存在则返回 null。
      parameters:
      - description: 会话 ID
        in: query
        name: conversation_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TaskSwaggerResponse'
      summary: 查询会话运行中任务
      tags:
      - tasks
swagger: "2.0"
