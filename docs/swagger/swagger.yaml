info:
  contact: {}
  description: Agent Runtime 示例应用 API 文档。
  title: Agent Runtime API
  version: 0.0.1
paths:
  /audit/runs/{id}:
    get:
      description: 根据审计运行 id 返回运行快照，供调试页展示运行级元数据。
      parameters:
      - description: 审计运行 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuditRunSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取审计运行
      tags:
      - audit
  /audit/runs/{id}/events:
    get:
      description: 根据审计运行 id 返回按 seq 升序排列的审计事件列表。
      parameters:
      - description: 审计运行 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuditEventsSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取审计运行事件
      tags:
      - audit
  /audit/runs/{id}/replay:
    get:
      description: 根据审计运行 id 返回已组装的回放包，包含时间线与调试所需工件摘要。
      parameters:
      - description: 审计运行 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuditReplaySwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取审计运行回放包
      tags:
      - audit
  /auth/login:
    post:
      consumes:
      - application/json
      description: 校验用户名密码并写入 session cookie，成功后返回当前用户信息。
      parameters:
      - description: 登录请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AuthLoginSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthUserSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 用户登录
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 删除当前 session 并清理浏览器中的 session cookie。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthLogoutSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 退出登录
      tags:
      - auth
  /auth/me:
    get:
      description: 校验 session cookie 后返回当前登录用户的基础信息。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthUserSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取当前用户
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码创建账号，注册成功后返回用户基础信息。
      parameters:
      - description: 注册请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AuthRegisterSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthUserSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 注册账号
      tags:
      - auth
  /conversations:
    get:
      description: 返回按最近活跃时间倒序排列的 conversation 列表，包含标题、最后一条消息摘要和消息数等轻量展示字段。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConversationListSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取会话列表
      tags:
      - conversations
  /conversations/{id}:
    delete:
      description: 根据 conversation id 删除会话及其历史消息，供 UI 删除会话项。
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConversationDeleteSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 删除会话
      tags:
      - conversations
    get:
      description: 根据 conversation id 返回会话元数据，包括 provider、model、标题、最近消息摘要与消息数。
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConversationDetailSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取会话详情
      tags:
      - conversations
  /conversations/{id}/messages:
    get:
      description: 根据 conversation id 返回按写入顺序排列的历史消息列表，供 UI 恢复聊天内容。
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConversationMessagesSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取会话消息历史
      tags:
      - conversations
  /hello/say:
    get:
      description: 返回一个简单的问候语，用于确认 HTTP 服务已经启动。
      parameters:
      - description: 名称
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ExampleSayHelloSwaggerResponse'
      summary: 示例问候接口
      tags:
      - example
  /models:
    get:
      description: 返回当前服务启动时注入的全部 LLM provider/model 配置，以及前端可直接使用的默认 provider/model。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ModelCatalogSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取模型目录
      tags:
      - models
  /prompts/bindings:
    get:
      description: 仅管理员可读取提示词绑定列表，可按 scene、phase、status、prompt_id、provider_id、model_id
        过滤。
      parameters:
      - description: 场景
        in: query
        name: scene
        type: string
      - description: 阶段
        in: query
        name: phase
        type: string
      - description: 状态
        in: query
        name: status
        type: string
      - description: 提示词文档 ID
        in: query
        name: prompt_id
        type: string
      - description: Provider ID
        in: query
        name: provider_id
        type: string
      - description: Model ID
        in: query
        name: model_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PromptBindingListSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 获取提示词绑定列表
      tags:
      - prompts
    post:
      consumes:
      - application/json
      description: 仅管理员可创建提示词绑定。
      parameters:
      - description: 提示词绑定请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.PromptBindingCreateSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PromptBindingSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorSwaggerResponse'
      summary: 创建提示词绑定
      tags:
      - prompts
  /prompts/bindings/{id}:
    delete:
      description: 仅管理员可删除指定提示词绑定。
      parameters:
      - description: 提示词绑定 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
