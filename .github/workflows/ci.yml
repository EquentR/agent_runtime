name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: List packages
        run: go list ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/ice_art

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir webapp install --frozen-lockfile

      - name: Type check
        run: pnpm --dir webapp exec vue-tsc -b

      - name: Test
        run: pnpm --dir webapp exec vitest run

      - name: Build
        run: pnpm --dir webapp build
