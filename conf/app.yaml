workspaceDir: "workspace"
workspaces:
  root: data/workspaces

server:
  host: "0.0.0.0"
  port: 18080
  apiBasePath: /api/v1
  staticPaths:
    - path: /
      dir: static/web

sqlite:
  name: app
  autoCreate: true
  inMemory: false
  dbDir: data/
  logLevel: debug # 默认的sql日志打印级别，不是日志系统的级别，日志系统的级别由log.level控制
  params:
    - _pragma=journal_mode(WAL)
    - _pragma=busy_timeout(30000)
    - _txlock=exclusive

log:
  level: info
  file: logs/app.log
  rotation: true
  maxSize: 100
  maxAge: 30
  maxBackups: 7
  compress: true

security:
  appSecret: ${APP_SECRET}
  secureCookie: false
  publicRegistration:
    enabled: true
  smtp:
    enabled: false
    host: ${SMTP_HOST}
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    from: ${SMTP_FROM}
    useTLS: false
    useStartTLS: true
  turnstile:
    enabled: false
    siteKey: ${TURNSTILE_SITE_KEY}
    secret: ${TURNSTILE_SECRET}
    protectLogin: true
    protectRegistration: true
    protectVerification: true

tasks:
  workerCount: 16
  runnerId: example-agent
  pollInterval: 5s

tools:
  webSearch:
    defaultProvider: tavily
    tavily:
      apiKey: ${TAVILY_API_KEY}
      baseUrl: https://api.tavily.com
    # serpApi:
    #   apiKey: ${SERPAPI_API_KEY}
    #   baseUrl: https://serpapi.com
    # bing:
    #   apiKey: ${BING_SEARCH_API_KEY}
    #   baseUrl: https://api.bing.microsoft.com
  imageGen:
    defaultProvider: openai
    openai:
      baseUrl: ${OPENAI_BASE_URL}
      apiKey: ${OPENAI_API_KEY}
      model: gpt-image-2
      stream: true
      partialImages: 1
      defaultSize: 1024x1024
      defaultQuality: auto
      defaultOutputFormat: png

attachments:
  storageBackend: filesystem
  filesystem:
    root: data/attachments
  draftTTL: 24h
  sentRetention: 720h
  gcInterval: 1h

llmRequestTimeout: 10m

llmProviders:
  # UI 侧会通过 provider_id + model_id 选择具体模型，
  # 其中 provider_id 对应这里的 name，model_id 对应 models[].id。
- name: openai
  baseUrl: ${OPENAI_BASE_URL}
  apiKey: ${OPENAI_API_KEY}
  models:
    - id: gpt-5.5
      name: GPT-5.5
#      type: openai_chat        # official SDK Chat Completions with native prompt cache fields
#      type: openai_completions # legacy third-party-compatible Chat Completions
      type: openai_responses
      capabilities:
        attachments: true
      context:
        max: 258000
      cost:
        input: 6
        cachedInput: 0.6
        output: 25
    - id: gpt-5.4
      name: GPT-5.4
      type: openai_responses
      capabilities:
        attachments: true
      context:
        max: 1050000
      cost:
        input: 3
        cachedInput: 0.3
        output: 12


