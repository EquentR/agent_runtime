workspaceDir: "workspace"

server:
  host: "0.0.0.0"
  port: 18080
  apiBasePath: /api/v1
  staticPaths:
    - path: /
      dir: static/web

sqlite:
  name: app
  autoCreate: true
  inMemory: false
  dbDir: data/
  logLevel: debug # 默认的sql日志打印级别，不是日志系统的级别，日志系统的级别由log.level控制
  params:
    - _pragma=journal_mode(WAL)
    - _pragma=busy_timeout(30000)
    - _txlock=exclusive

log:
  level: info
  file: logs/app.log
  rotation: true
  maxSize: 100
  maxAge: 30
  maxBackups: 7
  compress: true

tasks:
  workerCount: 16
  runnerId: example-agent

tools:
  webSearch:
    defaultProvider: tavily
    tavily:
      apiKey: ${TAVILY_API_KEY}
      baseUrl: https://api.tavily.com
    # serpApi:
    #   apiKey: ${SERPAPI_API_KEY}
    #   baseUrl: https://serpapi.com
    # bing:
    #   apiKey: ${BING_SEARCH_API_KEY}
    #   baseUrl: https://api.bing.microsoft.com

llmRequestTimeout: 10m

llmProviders:
  # UI 侧会通过 provider_id + model_id 选择具体模型，
  # 其中 provider_id 对应这里的 name，model_id 对应 models[].id。
- name: aihubmix
  baseUrl: ${OPENAI_BASE_URL}
  apiKey: ${OPENAI_API_KEY}
  models:
    - id: glm-5
      name: GLM-5
      type: openai_completions
      context:
        max: 20200
        input: 12008
        output: 8192
      cost:
        input: 0.438
        cachedInput: 0.04375
        output: 3.5
    - id: kimi-k2.5
      name: Kimi-K2.5
      type: openai_completions
      context:
        max: 256000
        input: 247808
        output: 8192
      cost:
        input: 0.6
        cachedInput: 0.01
        output: 3
    - id: gpt-5.4
      name: GPT-5.4
      type: openai_responses
      context:
        max: 1050000
        input: 922000
        output: 128000
      cost:
        input: 0.6
        cachedInput: 0.01
        output: 3

