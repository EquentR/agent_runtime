server:
  host: "0.0.0.0"
  port: 18080
  apiBasePath: /api/v1
  staticPaths:
    - path: /
      dir: static/web

sqlite:
  name: app
  autoCreate: true
  inMemory: false
  dbDir: data/
  logLevel: debug # 默认的sql日志打印级别，不是日志系统的级别，日志系统的级别由log.level控制
  params:
    - _pragma=journal_mode(WAL)
    - _pragma=busy_timeout(30000)
    - _txlock=exclusive

log:
  level: info
  file: logs/app.log
  rotation: true
  maxSize: 100
  maxAge: 30
  maxBackups: 7
  compress: true

llmProviders:
  # UI 侧会通过 provider_id + model_id 选择具体模型，
  # 其中 provider_id 对应这里的 name，model_id 对应 models[].id。
- name: openai
  baseUrl: ${OPENAI_BASE_URL}
  apiKey: ${OPENAI_API_KEY}
  models:
    - id: glm-5
      name: glm-5
      type: openai_completions
      context:
        max: 1050000
        input: 922000
        output: 128000
      cost:
        input: 0.438
        cachedInput: 0.04375
        output: 3.5


