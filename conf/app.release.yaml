# Release defaults keep the app runnable, but leave model and provider setup for the UI.
workspaceDir: "workspace"
workspaces:
  root: data/workspaces

server:
  host: "0.0.0.0"
  port: 18080
  apiBasePath: /api/v1
  staticPaths:
    - path: /
      dir: static/web

sqlite:
  name: app
  autoCreate: true
  inMemory: false
  dbDir: data/
  logLevel: debug
  params:
    - _pragma=journal_mode(WAL)
    - _pragma=busy_timeout(30000)
    - _txlock=exclusive

log:
  level: info
  file: logs/app.log
  rotation: true
  maxSize: 100
  maxAge: 30
  maxBackups: 7
  compress: true

security:
  appSecret: ice-art-release-secret-change-me
  secureCookie: false
  publicRegistration:
    enabled: true
  smtp:
    enabled: false
    host: ${SMTP_HOST}
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    from: ${SMTP_FROM}
    useTLS: false
    useStartTLS: true
  turnstile:
    enabled: false
    siteKey: ${TURNSTILE_SITE_KEY}
    secret: ${TURNSTILE_SECRET}
    protectLogin: true
    protectRegistration: true
    protectVerification: true

tasks:
  workerCount: 16
  runnerId: ice-art
  pollInterval: 5s

attachments:
  storageBackend: filesystem
  filesystem:
    root: data/attachments
  draftTTL: 24h
  sentRetention: 720h
  gcInterval: 1h

llmRequestTimeout: 10m

